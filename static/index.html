<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniWash Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.15) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 1rem;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 1.5rem;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 0.5rem;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .garment-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .order-list {
            list-style: none;
        }

        .order-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-info h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .order-info p {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--primary);
        }

        .status-RECEIVED { background: #6366f1; }
        .status-PROCESSING { background: #f59e0b; }
        .status-READY { background: #10b981; }
        .status-DELIVERED { background: #475569; }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MiniWash.</h1>
            <div id="connection-status" style="font-size: 0.8rem; color: var(--success);">● System Online</div>
        </header>

        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-label">Total Orders</div>
                <div class="stat-value" id="stat-total-orders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-value" id="stat-revenue">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Orders Ready</div>
                <div class="stat-value" id="stat-ready">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>New Order</h2>
                <form id="order-form">
                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="cust-name" required placeholder="Adya Archita">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="cust-phone" required placeholder="9876543210">
                    </div>
                    <div id="garments-list">
                        <label>Garments</label>
                        <div class="garment-row">
                            <input type="text" class="g-type" placeholder="Type (e.g. Saree)" required>
                            <input type="number" class="g-qty" placeholder="Qty" required min="1">
                            <input type="number" class="g-price" placeholder="Price" required min="0">
                        </div>
                    </div>
                    <button type="button" onclick="addGarmentRow()" style="background: transparent; border: 1px dashed var(--glass-border); margin: 1rem 0; width: 100%; padding: 0.5rem; color: var(--accent); cursor: pointer; border-radius: 0.5rem;">+ Add Another Item</button>
                    <button type="submit" class="btn">Create Order</button>
                </form>
            </div>

            <div class="card">
                <h2>Recent Orders</h2>
                <div id="orders-list" class="order-list">
                    <!-- Orders will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = ''; // Relative to the server

        async function fetchDashboard() {
            try {
                const res = await fetch('/dashboard');
                const data = await res.json();
                document.getElementById('stat-total-orders').innerText = data.total_orders;
                document.getElementById('stat-revenue').innerText = '₹' + data.total_revenue;
                document.getElementById('stat-ready').innerText = data.orders_per_status.READY || 0;
            } catch (e) { console.error(e); }
        }

        async function fetchOrders() {
            try {
                const res = await fetch('/orders');
                const data = await res.json();
                const list = document.getElementById('orders-list');
                list.innerHTML = data.reverse().slice(0, 5).map(order => `
                    <div class="order-item">
                        <div class="order-info">
                            <h3>${order.customer_name}</h3>
                            <p>${order.phone} • ${order.garments.length} items • ₹${order.total_bill}</p>
                        </div>
                        <span class="status-badge status-${order.status}">${order.status}</span>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function addGarmentRow() {
            const row = document.createElement('div');
            row.className = 'garment-row';
            row.innerHTML = `
                <input type="text" class="g-type" placeholder="Type" required>
                <input type="number" class="g-qty" placeholder="Qty" required min="1">
                <input type="number" class="g-price" placeholder="Price" required min="0">
            `;
            document.getElementById('garments-list').appendChild(row);
        }

        document.getElementById('order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = 'Creating...';
            btn.disabled = true;

            const garments = [];
            const rows = document.querySelectorAll('.garment-row');
            rows.forEach(row => {
                garments.push({
                    type: row.querySelector('.g-type').value,
                    quantity: parseInt(row.querySelector('.g-qty').value),
                    price_per_item: parseFloat(row.querySelector('.g-price').value)
                });
            });

            const order = {
                customer_name: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-phone').value,
                garments: garments
            };

            try {
                const res = await fetch('/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order)
                });
                if (res.ok) {
                    alert('Order created successfully!');
                    e.target.reset();
                    // Reset garment rows
                    document.getElementById('garments-list').innerHTML = `
                        <label>Garments</label>
                        <div class="garment-row">
                            <input type="text" class="g-type" placeholder="Type" required>
                            <input type="number" class="g-qty" placeholder="Qty" required min="1">
                            <input type="number" class="g-price" placeholder="Price" required min="0">
                        </div>
                    `;
                    fetchDashboard();
                    fetchOrders();
                }
            } catch (e) { console.error(e); }
            finally {
                btn.innerText = 'Create Order';
                btn.disabled = false;
            }
        });

        // Initialize
        fetchDashboard();
        fetchOrders();
        setInterval(fetchDashboard, 10000); // Update every 10s
    </script>
</body>
</html>
